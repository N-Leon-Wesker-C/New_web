# 适配你的路径：/var/www/html/dist
# 路径：/etc/nginx/sites-available/woshinc

server {
    listen 80;
    listen [::]:80;
    server_name woshinc.com www.woshinc.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name woshinc.com www.woshinc.com;

    ssl_certificate     /etc/letsencrypt/live/woshinc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/woshinc.com/privkey.pem;

    # 修改这里：你的前端路径
    root /var/www/html/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp3|docx|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
